services:

  mongo:
    image: mongo:6
    container_name: idt-mongo
    restart: unless-stopped
    command: --nojournal
    volumes:
      - mongo-data:/data/db
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  orion:
    image: fiware/orion:3.10.1
    container_name: idt-orion
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "1026:1026"
    command: -dbhost mongo -logLevel DEBUG -noCache
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 10s
      timeout: 5s
      retries: 15

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: idt-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  iot-agent:
    image: fiware/iotagent-json:1.26.0
    container_name: idt-iot-agent
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      orion:
        condition: service_healthy
    ports:
      - "4041:4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_TIMESTAMP=true
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_AUTOCAST=true
      - IOTA_MONGO_HOST=mongo
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_RESOURCE=/iot/json
      - IOTA_DEFAULT_KEY=irfane2024
      - IOTA_PROVIDER_URL=http://iot-agent:4041
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4041/iot/about || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  cratedb:
    image: crate:4.8
    container_name: idt-cratedb
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - cratedb-data:/data
    command: crate -Cnetwork.host=0.0.0.0 -Cdiscovery.type=single-node -Cauth.host_based.enabled=false
    environment:
      - CRATE_HEAP_SIZE=512m
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4200/ || exit 1"]
      interval: 20s
      timeout: 15s
      start_period: 30s
      retries: 10

  quantumleap:
    image: orchestracities/quantumleap:latest
    container_name: idt-quantumleap
    restart: unless-stopped
    depends_on:
      cratedb:
        condition: service_healthy
      orion:
        condition: service_healthy
    ports:
      - "8668:8668"
    environment:
      - QL_DEFAULT_DB=crate
      - CRATE_HOST=cratedb
      - CRATE_PORT=4200
      - USE_GEOCODING=False
      - CACHE_QUERIES=False
      - LOGLEVEL=DEBUG
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8668/version"]
      interval: 15s
      timeout: 10s
      retries: 10

  perseo-core:
    image: fiware/perseo-core:latest
    container_name: idt-perseo-core
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PERSEO_FE_URL=http://perseo-fe:9090
      - MAX_AGE=6000
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/perseo-core/version"]
      interval: 15s
      timeout: 10s
      retries: 10

  perseo-fe:
    image: fiware/perseo:latest
    container_name: idt-perseo-fe
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      perseo-core:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      - PERSEO_MONGO_ENDPOINT=mongo
      - PERSEO_CORE_URL=http://perseo-core:8080
      - PERSEO_ORION_URL=http://orion:1026/
      - PERSEO_LOG_LEVEL=debug
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/version"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────────────────────
  # MySQL -- Keyrock persistence
  # ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: idt-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=keyrock_root
      - MYSQL_DATABASE=idm
      - MYSQL_USER=idm
      - MYSQL_PASSWORD=idm_pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "idm", "-pidm_pass"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ─────────────────────────────────────────────────────────────
  # Keyrock IDM -- identity management
  # ─────────────────────────────────────────────────────────────
  keyrock:
    image: fiware/idm:8.3.3
    container_name: idt-keyrock
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3005:3005"
    environment:
      - IDM_DB_HOST=mysql
      - IDM_DB_PORT=3306
      - IDM_DB_NAME=idm
      - IDM_DB_USER=idm
      - IDM_DB_PASS=idm_pass
      - IDM_HOST=http://localhost:3005
      - IDM_PORT=3005
      - IDM_HTTPS_ENABLED=false
      - IDM_CORS_ENABLED=true
      - IDM_CORS_ORIGIN=*
      - IDM_ADMIN_USER=admin
      - IDM_ADMIN_EMAIL=admin@irfane.ma
      - IDM_ADMIN_PASS=admin1234
      - IDM_SESSION_SECRET=irfane_session_secret_2024
      - IDM_ENCRYPTION_KEY=irfane_encrypt_key_2024
    networks:
      - idt-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3005/version"]
      interval: 20s
      timeout: 5s
      start_period: 90s
      retries: 15


  # ─────────────────────────────────────────────────────────────
  # PostgreSQL -- Cygnus long-term archive storage
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: idt-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=cygnus
      - POSTGRES_PASSWORD=cygnus
      - POSTGRES_DB=cygnus
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cygnus"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────
  # Cygnus -- FIWARE data sink / archiver
  # ─────────────────────────────────────────────────────────────
  cygnus:
    image: fiware/cygnus-ngsi:latest
    container_name: idt-cygnus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      orion:
        condition: service_healthy
    ports:
      - "5055:5055"
      - "5080:5080"
    environment:
      - CYGNUS_POSTGRESQL_HOST=postgres
      - CYGNUS_POSTGRESQL_PORT=5432
      - CYGNUS_POSTGRESQL_USER=cygnus
      - CYGNUS_POSTGRESQL_PASS=cygnus
      - CYGNUS_POSTGRESQL_DATABASE=cygnus
      - CYGNUS_POSTGRESQL_ENABLE_CACHE=true
      - CYGNUS_POSTGRESQL_SERVICE_PORT=5055
      - CYGNUS_API_PORT=5080
      - CYGNUS_LOG_LEVEL=INFO
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5080/v1/version || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 10

  webhook:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: idt-webhook
    restart: unless-stopped
    ports:
      - "5051:5050"
    environment:
      - LOG_LEVEL=info
      - ORION_URL=http://orion:1026
      - PERSEO_URL=http://perseo-fe:9090
      - WEBHOOK_URL=http://webhook:5050
      - CYGNUS_URL=http://cygnus:5055
      - FIWARE_SERVICE=irfane
      - FIWARE_SERVICEPATH=/smartcity
    networks:
      - idt-net

  simulator:
    build:
      context: ./simulators
      dockerfile: Dockerfile
    container_name: idt-simulator
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      orion:
        condition: service_healthy
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_APIKEY=irfane2024
      - IOTA_URL=http://iot-agent:4041
      - ORION_URL=http://orion:1026
      - FIWARE_SERVICE=irfane
      - FIWARE_SERVICEPATH=/smartcity
      - TICK_INTERVAL_MS=5000
      - LOG_LEVEL=info
    networks:
      - idt-net

  # ─────────────────────────────────────────────────────────────
  # Grafana -- time-series dashboards for city operators
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: idt-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=irfane2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-worldmap-panel
    networks:
      - idt-net
    depends_on:
      - postgres
      - cratedb


  # ─────────────────────────────────────────────────────────────
  # Scorpio — NGSI-LD context broker (next-gen Orion)
  # Runs alongside Orion-v2 for gradual migration
  # Access: http://localhost:9090/ngsi-ld/v1/entities
  # ─────────────────────────────────────────────────────────────
  scorpio-postgres:
    image: postgis/postgis:14-3.3-alpine
    container_name: idt-scorpio-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=scorpio
      - POSTGRES_PASSWORD=scorpio
      - POSTGRES_DB=scorpio
    volumes:
      - scorpio-postgres-data:/var/lib/postgresql/data
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorpio"]
      interval: 10s
      timeout: 5s
      retries: 10

  scorpio:
    image: scorpiobroker/all-in-one-runner:java-latest
    container_name: idt-scorpio
    restart: unless-stopped
    ports:
      - "9095:9090"
    environment:
      - DBHOST=scorpio-postgres
      - DBPORT=5432
      - DBNAME=scorpio
      - DBUSER=scorpio
      - DBPASS=scorpio
      - LOG_LEVEL=INFO
    depends_on:
      scorpio-postgres:
        condition: service_healthy
    networks:
      - idt-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/q/health || exit 1"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 10


volumes:
  mongo-data:
  cratedb-data:
  mosquitto-data:
  scorpio-postgres-data:
  grafana-data:
  postgres-data:
  mysql-data:

networks:
  idt-net:
    driver: bridge